version: "2.3"
services:
  proxy:
    image: ${SVC_NAME}
    container_name: ${SVC_NAME}
    build: .
    command: uvicorn ${PROXY_NAME}.main:app --host 0.0.0.0 --port $SVC_PORT_INT
    volumes:
    - $SVC_XFER:/opt/xfer
    network_mode: host
    environment:
      PYTHONPATH: /usr/local/src/src/${PROXY_NAME}
      MIBDIRS: /usr/share/snmp/mibs:/usr/share/snmp/mibs/iana:/usr/share/snmp/mibs/ietf
      MIBS: ${MIBS_IDENTIFIER}
      DBPASS: ${DBPASS}
    restart:
      always
